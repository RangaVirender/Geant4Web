name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # never kill a long Geant4 compile; queue instead

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Slim Geant4 datasets
        run: |
          pip install --quiet requests
          python3 scripts/slim_datasets.py --out data/slim

      - name: Restore Geant4 WASM build cache
        id: g4cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build/geant4-wasm-install
            build/emsdk
            build/geant4-wasm-build
            build/geant4-v11.3.2
          key: geant4-wasm-${{ hashFiles('scripts/build_geant4_wasm.sh') }}
          restore-keys: geant4-wasm-

      # Compile for at most 4.5 h; a timeout exits cleanly (code 124) so the
      # partial build still gets cached and the next run resumes from it.
      - name: Build Geant4 with Emscripten (resumable)
        if: steps.g4cache.outputs.cache-hit != 'true'
        run: |
          timeout 270m bash scripts/build_geant4_wasm.sh || {
            code=$?
            if [ "$code" = "124" ]; then
              echo "::error::Compile time-slice over; partial build was cached. Just RE-RUN this workflow - it resumes where it stopped."
            fi
            exit "$code"
          }

      - name: Save Geant4 WASM build cache
        if: always() && steps.g4cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/geant4-wasm-install
            build/emsdk
            build/geant4-wasm-build
            build/geant4-v11.3.2
          key: geant4-wasm-${{ hashFiles('scripts/build_geant4_wasm.sh') }}-${{ github.run_id }}

      - name: Re-activate emsdk from cache
        if: steps.g4cache.outputs.cache-hit == 'true'
        run: |
          EMSDK_VERSION="${EMSDK_VERSION:-3.1.61}"
          build/emsdk/emsdk install $EMSDK_VERSION
          build/emsdk/emsdk activate $EMSDK_VERSION

      - name: Build WASM application + pack data
        run: bash scripts/build_app_wasm.sh

      - name: Build web frontend
        run: |
          cd web
          npm install
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
